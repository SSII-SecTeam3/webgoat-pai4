name: DevSecOps - PAI 4

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # -------------------------------------------------------------
  # Comprobar compilación (build)
  # -------------------------------------------------------------
  build:
    name: Compilación del proyecto
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el código fuente
        uses: actions/checkout@v4

      - name: Configurar el entorno Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar con Maven
        run: mvn clean compile -DskipTests --no-transfer-progress

  # -------------------------------------------------------------
  # Ejecución de Tests Unitarios
  # -------------------------------------------------------------
  unit-tests:
    name: Tests unitarios
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Clonar el código fuente
        uses: actions/checkout@v4

      - name: Configurar el entorno Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ejecutar tests
        run: mvn test --no-transfer-progress

  # -------------------------------------------------------------
  # HERRAMIENTA 1: Análisis de Dependencias (SCA)
  # -------------------------------------------------------------
  sca-dependency-check:
    name: Escaneo con OWASP Dependency-Check
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el código fuente
        uses: actions/checkout@v4

      - name: Configurar el entorno Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ejecutar OWASP Dependency-Check
        run: mvn org.owasp:dependency-check-maven:check -Dformat=XML --no-transfer-progress

      - name: Guardar el informe como Artefacto
        # always() asegura que el artefacto se guarde incluso si el escáner detecta fallos y marca el job como "fallido"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-dependencias-xml
          path: target/dependency-check-report.xml
          retention-days: 14

  # -------------------------------------------------------------
  # HERRAMIENTA 2: Análisis Estático de Seguridad (SAST)
  # -------------------------------------------------------------
  sast-codacy:
    name: Análisis SAST con Codacy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Clonar el código fuente
        uses: actions/checkout@v4
      
      - name: Crear directorio target
        run: mkdir -p target

      - name: Ejecutar Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@master
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: target/results.sarif
          format: sarif

      - name: Guardar el informe como Artefacto
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: reporte-sast-sarif
          path: target/results.sarif
          retention-days: 14